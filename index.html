<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>加班记录助手 Pro (Standalone)</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'] },
          colors: { slate: { 850: '#1e293b', 900: '#0f172a' } }
        }
      }
    }
  </script>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- SheetJS (Global Load) -->
  <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Import Map: Critical for resolving 'react' inside esm.sh modules -->
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.2.0",
      "react-dom": "https://esm.sh/react-dom@18.2.0",
      "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
      "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
      "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react,react-dom",
      "lunar-javascript": "https://esm.sh/lunar-javascript@1.6.12"
    }
  }
  </script>

  <style>
    body { font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    .dark ::-webkit-scrollbar-thumb { background: #475569; }
    .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    /* Animation Utils */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.2s ease-out forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'react';
    import ReactDOM from 'react-dom/client';
    import { 
      BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Legend, PieChart, Pie, Cell 
    } from 'recharts';
    import { 
      Download, Upload, Briefcase, Moon, Sun, Type, ChevronLeft, ChevronRight, Plus, X, Save, Trash2, Clock, CalendarDays, TrendingUp, Calculator, Search, AlertCircle, Info, PieChart as PieIcon, MessageSquare
    } from 'lucide-react';
    import { Solar, Lunar, HolidayUtil } from 'lunar-javascript';

    // --- TYPES & ENUMS (Converted to JS Objects) ---
    const RecordCategory = {
      OVERTIME: '加班',
      LEAVE: '请假'
    };

    const OvertimeType = {
      WEEKDAY: '平日延时',
      WEEKEND: '周末加班',
      HOLIDAY: '节假日加班'
    };

    const LeaveType = {
      ANNUAL: '年假',
      SICK: '病假',
      PERSONAL: '事假',
      COMPENSATORY: '调休',
      OTHER: '其他'
    };

    // --- UTILS: Excel Utils ---
    const exportToExcel = (records) => {
      if (records.length === 0) {
        alert("暂无记录可导出。");
        return;
      }
      const dataToExport = records.map(record => {
        const dateObj = new Date(record.date);
        const dayOfWeek = dateObj.toLocaleDateString('zh-CN', { weekday: 'long' });
        return {
          "日期": record.date,
          "星期": dayOfWeek,
          "分类": record.category,
          "类型": record.type,
          "开始时间": record.startTime,
          "结束时间": record.endTime,
          "时长(小时)": record.duration,
          "备注": record.note
        };
      });
      const ws = XLSX.utils.json_to_sheet(dataToExport);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "考勤记录");
      const today = new Date().toISOString().split('T')[0];
      XLSX.writeFile(wb, `考勤记录_备份_${today}.xlsx`);
    };

    const parseImportFile = (file) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = e.target?.result;
            if (typeof data === 'string') {
              const parsed = JSON.parse(data);
              if (Array.isArray(parsed)) {
                const migrated = parsed.map(p => ({
                  ...p,
                  category: p.category || '加班',
                  type: p.type || '平日延时'
                }));
                resolve(migrated);
              } else {
                reject(new Error("无效的 JSON 格式"));
              }
            }
          } catch (err) { reject(err); }
        };
        reader.onerror = (err) => reject(err);
        reader.readAsText(file);
      });
    };

    // --- COMPONENT: RecordModal ---
    const RecordModal = ({ isOpen, onClose, onSave, onDelete, selectedDate, existingRecord }) => {
      const [category, setCategory] = useState(RecordCategory.OVERTIME);
      const [startTime, setStartTime] = useState('18:00');
      const [endTime, setEndTime] = useState('20:00');
      const [duration, setDuration] = useState(2.0);
      const [type, setType] = useState(OvertimeType.WEEKDAY);
      const [note, setNote] = useState('');

      useEffect(() => {
        if (isOpen) {
          if (existingRecord) {
            setCategory(existingRecord.category || RecordCategory.OVERTIME);
            setStartTime(existingRecord.startTime);
            setEndTime(existingRecord.endTime);
            setDuration(existingRecord.duration);
            setType(existingRecord.type);
            setNote(existingRecord.note);
          } else {
            const isWeekend = selectedDate.getDay() === 0 || selectedDate.getDay() === 6;
            setCategory(RecordCategory.OVERTIME);
            setStartTime('18:00'); 
            setEndTime('20:00');
            setDuration(2.0);
            setType(isWeekend ? OvertimeType.WEEKEND : OvertimeType.WEEKDAY);
            setNote('');
          }
        }
      }, [isOpen, existingRecord, selectedDate]);

      useEffect(() => {
        if (!isOpen) return;
        if (category === RecordCategory.OVERTIME) {
           const isLeaveType = Object.values(LeaveType).includes(type);
           if (isLeaveType) setType(OvertimeType.WEEKDAY);
           if (startTime === '09:00' && endTime === '18:00') {
               setStartTime('18:00'); setEndTime('20:00'); calculateAndSetDuration('18:00', '20:00');
           }
        } else {
           const isOtType = Object.values(OvertimeType).includes(type);
           if (isOtType) setType(LeaveType.ANNUAL);
           if (startTime === '18:00' && endTime === '20:00') {
               setStartTime('09:00'); setEndTime('18:00'); calculateAndSetDuration('09:00', '18:00');
           }
        }
      }, [category]);

      const calculateAndSetDuration = (start, end) => {
        const [startH, startM] = start.split(':').map(Number);
        const [endH, endM] = end.split(':').map(Number);
        let startMin = startH * 60 + startM;
        let endMin = endH * 60 + endM;
        if (endMin < startMin) endMin += 24 * 60;
        const diffHours = (endMin - startMin) / 60;
        setDuration(parseFloat(diffHours.toFixed(1)));
      };

      const handleTimeChange = (field, value) => {
        const newStart = field === 'start' ? value : startTime;
        const newEnd = field === 'end' ? value : endTime;
        if (field === 'start') setStartTime(value);
        if (field === 'end') setEndTime(value);
        calculateAndSetDuration(newStart, newEnd);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const record = {
          id: existingRecord?.id || crypto.randomUUID(),
          date: selectedDate.toISOString().split('T')[0],
          startTime, endTime, duration: Number(duration), category, type, note
        };
        onSave(record);
        onClose();
      };

      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
          <div className="bg-white dark:bg-slate-800 rounded shadow-xl w-full max-w-md overflow-hidden flex flex-col max-h-[90vh]">
            <div className="bg-gray-100 dark:bg-slate-700 px-4 py-3 flex justify-between items-center border-b dark:border-slate-600">
              <h2 className="text-lg font-bold text-gray-800 dark:text-white">{selectedDate.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric' })}</h2>
              <button onClick={onClose}><X size={20} className="text-gray-500" /></button>
            </div>
            <form onSubmit={handleSubmit} className="p-4 space-y-4 overflow-y-auto">
              <div className="flex border rounded overflow-hidden">
                <button type="button" onClick={() => setCategory(RecordCategory.OVERTIME)} className={`flex-1 py-2 text-sm font-medium ${category === RecordCategory.OVERTIME ? 'bg-blue-600 text-white' : 'bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300'}`}>加班</button>
                <button type="button" onClick={() => setCategory(RecordCategory.LEAVE)} className={`flex-1 py-2 text-sm font-medium ${category === RecordCategory.LEAVE ? 'bg-purple-600 text-white' : 'bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300'}`}>请假</button>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <div><label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">开始时间</label><input type="time" required value={startTime} onChange={(e) => handleTimeChange('start', e.target.value)} className="w-full border p-2 rounded dark:bg-slate-700 dark:border-slate-600 dark:text-white" /></div>
                <div><label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">结束时间</label><input type="time" required value={endTime} onChange={(e) => handleTimeChange('end', e.target.value)} className="w-full border p-2 rounded dark:bg-slate-700 dark:border-slate-600 dark:text-white" /></div>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">时长 (小时)</label>
                <input type="number" step="0.1" required value={duration} onChange={(e) => setDuration(parseFloat(e.target.value))} className="w-full border p-2 rounded dark:bg-slate-700 dark:border-slate-600 dark:text-white" />
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">类型</label>
                <select value={type} onChange={(e) => setType(e.target.value)} className="w-full border p-2 rounded dark:bg-slate-700 dark:border-slate-600 dark:text-white">
                  {category === RecordCategory.OVERTIME ? Object.values(OvertimeType).map(t => <option key={t} value={t}>{t}</option>) : Object.values(LeaveType).map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>
              <div>
                <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 mb-1">备注</label>
                <textarea rows={3} value={note} onChange={(e) => setNote(e.target.value)} className="w-full border p-2 rounded dark:bg-slate-700 dark:border-slate-600 dark:text-white" />
              </div>
              <div className="flex items-center gap-3 pt-2">
                 {existingRecord && <button type="button" onClick={() => { onDelete(existingRecord.id); onClose(); }} className="p-2 border rounded text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20"><Trash2 size={20} /></button>}
                <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded flex items-center justify-center gap-2"><Save size={18} /> 保存</button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // --- COMPONENT: StatsPanel ---
    const StatsPanel = ({ records, hourlyRate, setHourlyRate, currentMonth }) => {
      const [calcStart, setCalcStart] = useState(() => {
        const now = new Date();
        return new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
      });
      const [calcEnd, setCalcEnd] = useState(() => new Date().toISOString().split('T')[0]);
      const [calcRate, setCalcRate] = useState(hourlyRate);
      const [calcResult, setCalcResult] = useState(null);

      const currentMonthStr = currentMonth.toISOString().slice(0, 7);
      const currentMonthRecords = records.filter(r => r.date.startsWith(currentMonthStr));
      
      const otRecords = currentMonthRecords.filter(r => r.category === RecordCategory.OVERTIME || !r.category);
      const leaveRecords = currentMonthRecords.filter(r => r.category === RecordCategory.LEAVE);
      const totalOtHours = otRecords.reduce((acc, curr) => acc + curr.duration, 0);
      const totalLeaveHours = leaveRecords.reduce((acc, curr) => acc + curr.duration, 0);

      // Pie Chart Data Calculation
      let otBreakdown = { weekday: 0, weekend: 0, holiday: 0 };
      otRecords.forEach(r => {
        if(r.type === OvertimeType.WEEKDAY) otBreakdown.weekday += r.duration;
        else if(r.type === OvertimeType.WEEKEND) otBreakdown.weekend += r.duration;
        else if(r.type === OvertimeType.HOLIDAY) otBreakdown.holiday += r.duration;
        else otBreakdown.weekday += r.duration; 
      });

      const pieData = [
        { name: '平日延时', value: parseFloat(otBreakdown.weekday.toFixed(1)) },
        { name: '周末加班', value: parseFloat(otBreakdown.weekend.toFixed(1)) },
        { name: '节假日加班', value: parseFloat(otBreakdown.holiday.toFixed(1)) }
      ].filter(item => item.value > 0);

      const pieColors = ['#3b82f6', '#f97316', '#ef4444']; // Blue, Orange, Red

      const getLast6MonthsData = () => {
        const data = [];
        for (let i = 5; i >= 0; i--) {
          const d = new Date(currentMonth);
          d.setMonth(d.getMonth() - i);
          const monthStr = d.toISOString().slice(0, 7);
          const label = d.toLocaleDateString('zh-CN', { month: 'short' });
          const monthRecords = records.filter(r => r.date.startsWith(monthStr));
          
          let ot = 0, leave = 0;
          monthRecords.forEach(r => {
            if (r.category === RecordCategory.LEAVE) leave += r.duration;
            else ot += r.duration;
          });
          data.push({ 
            name: label, 
            "加班": parseFloat(ot.toFixed(1)),
            "请假": parseFloat(leave.toFixed(1))
          });
        }
        return data;
      };
      const barData = getLast6MonthsData();

      const handleCalculate = () => {
        const targetRecords = records.filter(r => r.date >= calcStart && r.date <= calcEnd);
        let weekdayOt = 0, weekendOt = 0, holidayOt = 0, leave = 0;
        targetRecords.forEach(r => {
          if (r.category === RecordCategory.LEAVE) leave += r.duration;
          else {
            if (r.type === OvertimeType.WEEKDAY) weekdayOt += r.duration;
            else if (r.type === OvertimeType.WEEKEND) weekendOt += r.duration;
            else if (r.type === OvertimeType.HOLIDAY) holidayOt += r.duration;
            else weekdayOt += r.duration;
          }
        });
        const weightedOt = (weekdayOt * 1.5) + (weekendOt * 2.0) + (holidayOt * 3.0);
        const netHours = Math.max(0, weightedOt - leave);
        const total = netHours * calcRate;

        setCalcResult({
          weekdayOt: parseFloat(weekdayOt.toFixed(1)),
          weekendOt: parseFloat(weekendOt.toFixed(1)),
          holidayOt: parseFloat(holidayOt.toFixed(1)),
          weightedOt: parseFloat(weightedOt.toFixed(1)),
          leave: parseFloat(leave.toFixed(1)),
          total: Math.floor(total)
        });
        if (calcRate !== hourlyRate) setHourlyRate(calcRate);
      };

      return (
        <div className="h-full flex flex-col gap-5 overflow-y-auto pr-2 pb-6">
          {/* Top Overview Cards */}
          <div className="shrink-0">
             <h3 className="text-sm font-semibold text-slate-500 dark:text-slate-400 mb-3">本月概览 ({currentMonth.toLocaleDateString('zh-CN', { month: 'long' })})</h3>
             <div className="grid grid-cols-2 gap-4">
               <div className="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl flex flex-col gap-1 border border-blue-100 dark:border-blue-900/50">
                 <div className="flex items-center gap-2 text-blue-600 dark:text-blue-400">
                    <Clock size={16} /> <span className="text-sm font-medium">加班时长</span>
                 </div>
                 <span className="text-2xl font-bold text-slate-800 dark:text-white">{totalOtHours.toFixed(1)} <span className="text-sm font-normal text-slate-500">h</span></span>
               </div>
               <div className="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-xl flex flex-col gap-1 border border-purple-100 dark:border-purple-900/50">
                 <div className="flex items-center gap-2 text-purple-600 dark:text-purple-400">
                    <CalendarDays size={16} /> <span className="text-sm font-medium">请假/调休</span>
                 </div>
                 <span className="text-2xl font-bold text-slate-800 dark:text-white">{totalLeaveHours.toFixed(1)} <span className="text-sm font-normal text-slate-500">h</span></span>
               </div>
             </div>
          </div>

          {/* Pie Chart */}
          <div className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm shrink-0">
             <h3 className="flex items-center gap-2 text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"><PieIcon size={16} /> 本月工时构成</h3>
             <div className="h-[180px] w-full relative">
               {pieData.length > 0 ? (
                 <ResponsiveContainer width="100%" height="100%">
                   <PieChart>
                     <Pie
                       data={pieData}
                       cx="50%"
                       cy="50%"
                       innerRadius={50}
                       outerRadius={70}
                       paddingAngle={5}
                       dataKey="value"
                     >
                       {pieData.map((entry, index) => (
                         <Cell key={`cell-${index}`} fill={pieColors[index % pieColors.length]} />
                       ))}
                     </Pie>
                     <Tooltip contentStyle={{ backgroundColor: 'rgba(255, 255, 255, 0.95)', borderRadius: '8px', fontSize: '12px', border: 'none', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)' }} />
                     <Legend verticalAlign="bottom" height={36} iconType="circle" wrapperStyle={{ fontSize: '12px' }}/>
                   </PieChart>
                 </ResponsiveContainer>
               ) : (
                 <div className="absolute inset-0 flex items-center justify-center text-slate-400 text-sm">暂无数据</div>
               )}
             </div>
          </div>

          {/* Bar Chart */}
          <div className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm shrink-0">
             <h3 className="flex items-center gap-2 text-sm font-semibold text-slate-700 dark:text-slate-300 mb-2"><TrendingUp size={16} /> 近6个月工时趋势</h3>
             <div className="h-[200px] w-full">
                <ResponsiveContainer width="100%" height="100%">
                  <BarChart data={barData} barGap={4} margin={{top: 5, right: 5, bottom: 5, left: -20}}>
                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                    <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{fontSize: 10, fill: '#64748b'}} dy={5} />
                    <YAxis axisLine={false} tickLine={false} tick={{fontSize: 10, fill: '#64748b'}} />
                    <Tooltip cursor={{fill: 'rgba(241, 245, 249, 0.5)'}} contentStyle={{ backgroundColor: '#fff', border: 'none', borderRadius: '8px', boxShadow: '0 4px 6px -1px rgb(0 0 0 / 0.1)', fontSize: '12px' }} />
                    <Legend verticalAlign="top" height={36} iconType="rect" iconSize={10} wrapperStyle={{ fontSize: '12px' }} />
                    <Bar name="加班" dataKey="加班" fill="#3b82f6" radius={[2, 2, 0, 0]} barSize={12} />
                    <Bar name="请假" dataKey="请假" fill="#c084fc" radius={[2, 2, 0, 0]} barSize={12} />
                  </BarChart>
                </ResponsiveContainer>
             </div>
          </div>

          {/* Calculator - Simplified */}
          <div className="bg-white dark:bg-slate-800 p-4 rounded-xl border border-slate-100 dark:border-slate-700 shadow-sm shrink-0">
            <h3 className="flex items-center gap-2 text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3"><Calculator size={16} /> 加班费核算</h3>
            <div className="space-y-3">
               <div className="flex gap-2 items-center text-sm"><span className="w-16 text-slate-500">开始:</span><input type="date" value={calcStart} onChange={(e) => setCalcStart(e.target.value)} className="flex-1 border p-1.5 rounded bg-slate-50 dark:bg-slate-700 dark:border-slate-600 outline-none focus:ring-1 focus:ring-blue-500" /></div>
               <div className="flex gap-2 items-center text-sm"><span className="w-16 text-slate-500">结束:</span><input type="date" value={calcEnd} onChange={(e) => setCalcEnd(e.target.value)} className="flex-1 border p-1.5 rounded bg-slate-50 dark:bg-slate-700 dark:border-slate-600 outline-none focus:ring-1 focus:ring-blue-500" /></div>
               <div className="flex gap-2 items-center text-sm"><span className="w-16 text-slate-500">时薪:</span><input type="number" value={calcRate} onChange={(e) => setCalcRate(Number(e.target.value))} className="flex-1 border p-1.5 rounded bg-slate-50 dark:bg-slate-700 dark:border-slate-600 outline-none focus:ring-1 focus:ring-blue-500" /></div>
               <button onClick={handleCalculate} className="w-full bg-slate-800 hover:bg-slate-700 text-white py-2 rounded-lg text-sm font-medium transition-colors">开始计算</button>
            </div>
            
            {calcResult && (
              <div className="mt-4 pt-4 border-t border-slate-100 dark:border-slate-700 animate-fade-in">
                <div className="flex justify-between items-center bg-green-50 dark:bg-green-900/20 p-3 border border-green-100 dark:border-green-900/50 rounded-lg mb-3">
                  <span className="font-medium text-green-700 dark:text-green-400 text-sm">预计发放</span>
                  <span className="font-bold text-lg text-green-700 dark:text-green-400">¥{calcResult.total}</span>
                </div>
                
                <div className="bg-slate-50 dark:bg-slate-900/50 rounded-lg p-3 text-xs text-slate-600 dark:text-slate-400 space-y-1.5">
                   <p className="font-semibold mb-1">计算明细:</p>
                   <div className="flex justify-between"><span>平日延时 (1.5倍):</span><span>{calcResult.weekdayOt}h</span></div>
                   <div className="flex justify-between"><span>周末加班 (2.0倍):</span><span>{calcResult.weekendOt}h</span></div>
                   <div className="flex justify-between"><span>节假加班 (3.0倍):</span><span>{calcResult.holidayOt}h</span></div>
                   <div className="flex justify-between text-red-500 dark:text-red-400"><span>请假扣除:</span><span>-{calcResult.leave}h</span></div>
                   <div className="border-t border-slate-200 dark:border-slate-700 pt-1.5 mt-1 flex justify-between font-medium"><span>加权净工时:</span><span>{Math.max(0, calcResult.weightedOt - calcResult.leave).toFixed(1)}h</span></div>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- COMPONENT: Calendar ---
    const Calendar = ({ currentDate, onDateChange, records, onDayClick, fontScale }) => {
      const [selectedLunarInfo, setSelectedLunarInfo] = useState('');

      useEffect(() => {
        const today = new Date();
        const targetDate = (currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear()) ? today : new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
        updateLunarInfo(targetDate);
      }, [currentDate]);

      const updateLunarInfo = (date) => {
        const solar = Solar.fromYmd(date.getFullYear(), date.getMonth() + 1, date.getDate());
        const lunar = solar.getLunar();
        let info = `农历${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()} · ${lunar.getYearShengXiao()}年`;
        const jieQi = lunar.getJieQi();
        if (jieQi) info += ` · ${jieQi}`;
        const festivals = [...solar.getFestivals(), ...lunar.getFestivals()];
        if (festivals.length > 0) info += ` · ${festivals.join(' ')}`;
        const holiday = HolidayUtil.getHoliday(date.getFullYear(), date.getMonth() + 1, date.getDate());
        if (holiday) info += ` · ${holiday.getName()} ${holiday.isWork() ? '(班)' : '(休)'}`;
        setSelectedLunarInfo(info);
      };
      
      const getDaysInMonth = (date) => {
        const year = date.getFullYear();
        const month = date.getMonth();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDayOfMonth = new Date(year, month, 1).getDay();
        return { daysInMonth, firstDayOfMonth };
      };

      const { daysInMonth, firstDayOfMonth } = getDaysInMonth(currentDate);
      const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
      const blanks = Array.from({ length: firstDayOfMonth }, (_, i) => i);

      const getRecordForDay = (day) => {
        const dateStr = new Date(currentDate.getFullYear(), currentDate.getMonth(), day).toISOString().split('T')[0];
        return records.find(r => r.date === dateStr);
      };

      const getDayLabel = (day) => {
        const solar = Solar.fromYmd(currentDate.getFullYear(), currentDate.getMonth() + 1, day);
        const lunar = solar.getLunar();
        const holiday = HolidayUtil.getHoliday(currentDate.getFullYear(), currentDate.getMonth() + 1, day);
        if (holiday && !holiday.isWork()) return { text: holiday.getName(), color: 'text-red-500 font-bold' };
        if (holiday && holiday.isWork()) return { text: '班', color: 'text-gray-400' };
        const solarFestivals = solar.getFestivals();
        if (solarFestivals.length > 0) return { text: solarFestivals[0], color: 'text-red-500' };
        const lunarFestivals = lunar.getFestivals();
        if (lunarFestivals.length > 0) return { text: lunarFestivals[0], color: 'text-red-500' };
        const jieQi = lunar.getJieQi();
        if (jieQi) return { text: jieQi, color: 'text-green-600 dark:text-green-400' };
        const d = lunar.getDayInChinese();
        const m = lunar.getMonthInChinese();
        return { text: d === '初一' ? `${m}月` : d, color: 'text-gray-400 dark:text-gray-500' };
      };

      const getRecordStyle = (record) => {
        if (record.category === RecordCategory.LEAVE) return 'bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-200';
        switch (record.type) {
          case OvertimeType.WEEKDAY: return 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-200';
          case OvertimeType.WEEKEND: return 'bg-orange-100 text-orange-800 dark:bg-orange-900 dark:text-orange-200';
          case OvertimeType.HOLIDAY: return 'bg-red-100 text-red-800 dark:bg-red-900 dark:text-red-200';
          default: return 'bg-gray-100 text-gray-800';
        }
      };

      return (
        <div className="bg-white dark:bg-slate-800 h-full flex flex-col border rounded shadow-sm">
          {/* Header */}
          <div className="flex justify-between items-center p-4 border-b dark:border-slate-700">
            <h2 className="text-xl font-bold text-gray-800 dark:text-white">{currentDate.toLocaleDateString('zh-CN', { month: 'long', year: 'numeric' })}</h2>
            <div className="flex gap-2">
              <button onClick={() => onDateChange(new Date(currentDate.getFullYear(), currentDate.getMonth() - 1, 1))} className="p-1 border rounded hover:bg-gray-100 dark:hover:bg-slate-700 dark:border-slate-600"><ChevronLeft size={20} /></button>
              <button onClick={() => onDateChange(new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 1))} className="p-1 border rounded hover:bg-gray-100 dark:hover:bg-slate-700 dark:border-slate-600"><ChevronRight size={20} /></button>
            </div>
          </div>
          {/* Week Header */}
          <div className="grid grid-cols-7 border-b dark:border-slate-700 bg-gray-50 dark:bg-slate-900">
            {['日', '一', '二', '三', '四', '五', '六'].map((day, i) => (
              <div key={day} className={`py-2 text-center text-sm font-bold ${i === 0 || i === 6 ? 'text-orange-600 dark:text-orange-400' : 'text-gray-600 dark:text-gray-400'}`}>{day}</div>
            ))}
          </div>
          {/* Calendar Grid - Table like */}
          <div className="grid grid-cols-7 flex-1 auto-rows-fr gap-px bg-gray-200 dark:bg-slate-700 border-l border-t dark:border-slate-700">
            {blanks.map((_, i) => <div key={`blank-${i}`} className="bg-white dark:bg-slate-800" />)}
            {days.map(day => {
              const record = getRecordForDay(day);
              const isToday = day === new Date().getDate() && currentDate.getMonth() === new Date().getMonth() && currentDate.getFullYear() === new Date().getFullYear();
              const labelInfo = getDayLabel(day);
              return (
                <div key={day} onClick={() => {updateLunarInfo(new Date(currentDate.getFullYear(), currentDate.getMonth(), day)); onDayClick(new Date(currentDate.getFullYear(), currentDate.getMonth(), day));}} className={`bg-white dark:bg-slate-800 p-1 cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-700 flex flex-col relative group ${isToday ? 'bg-blue-50 dark:bg-slate-700' : ''}`}>
                  <div className="flex justify-between items-start shrink-0">
                    <span style={{ fontSize: `${1.2 * fontScale}rem` }} className={`font-bold leading-none ${isToday ? 'text-blue-600' : 'text-gray-700 dark:text-gray-200'}`}>{day}</span>
                    <span style={{ fontSize: `${0.7 * fontScale}rem` }} className={`${labelInfo.color} truncate ml-1`}>{labelInfo.text}</span>
                  </div>
                  {record && (
                    <div className={`mt-1 p-0.5 text-center text-xs rounded shrink-0 ${getRecordStyle(record)}`}>
                      <span style={{ fontSize: `${0.8 * fontScale}rem` }} className="font-bold">{record.duration}h</span>
                    </div>
                  )}
                  {record && record.note && (
                    <div className="mt-auto pt-1 w-full" title={record.note}>
                       <p className="truncate text-gray-500 dark:text-gray-400" style={{ fontSize: `${0.65 * fontScale}rem` }}>
                         {record.note}
                       </p>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <div className="p-2 border-t dark:border-slate-700 text-center text-xs text-gray-500 dark:text-gray-400">
             {selectedLunarInfo}
          </div>
        </div>
      );
    };

    // --- COMPONENT: App ---
    const App = () => {
      const [records, setRecords] = useState([]);
      const [currentDate, setCurrentDate] = useState(new Date());
      const [hourlyRate, setHourlyRate] = useState(25);
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [calendarScale, setCalendarScale] = useState(1.0);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [selectedDate, setSelectedDate] = useState(new Date());
      const [editingRecord, setEditingRecord] = useState(undefined);

      useEffect(() => {
        const savedRecords = localStorage.getItem('ot_records');
        const savedRate = localStorage.getItem('ot_rate');
        const savedTheme = localStorage.getItem('ot_theme');
        const savedScale = localStorage.getItem('ot_scale');
        if (savedRecords) { try { setRecords(JSON.parse(savedRecords)); } catch (e) { console.error("Failed", e); } }
        if (savedRate) setHourlyRate(Number(savedRate));
        if (savedTheme === 'dark') { setIsDarkMode(true); document.documentElement.classList.add('dark'); }
        if (savedScale) setCalendarScale(Number(savedScale));
      }, []);

      useEffect(() => { localStorage.setItem('ot_records', JSON.stringify(records)); }, [records]);
      useEffect(() => { localStorage.setItem('ot_rate', String(hourlyRate)); }, [hourlyRate]);
      useEffect(() => { localStorage.setItem('ot_scale', String(calendarScale)); }, [calendarScale]);

      const toggleTheme = () => {
        const newMode = !isDarkMode;
        setIsDarkMode(newMode);
        if (newMode) { document.documentElement.classList.add('dark'); localStorage.setItem('ot_theme', 'dark'); } 
        else { document.documentElement.classList.remove('dark'); localStorage.setItem('ot_theme', 'light'); }
      };

      const adjustScale = (delta) => {
        setCalendarScale(prev => {
          const newVal = Math.max(0.8, Math.min(1.4, prev + delta));
          return parseFloat(newVal.toFixed(1));
        });
      };

      const handleDayClick = (date) => {
        const existing = records.find(r => r.date === date.toISOString().split('T')[0]);
        setSelectedDate(date);
        setEditingRecord(existing);
        setIsModalOpen(true);
      };

      const handleSaveRecord = (record) => {
        setRecords(prev => {
          const filtered = prev.filter(r => r.id !== record.id && r.date !== record.date);
          return [...filtered, record];
        });
      };

      const handleDeleteRecord = (id) => {
        if (confirm("确认删除这条记录吗？")) setRecords(prev => prev.filter(r => r.id !== id));
      };

      const handleImport = async (e) => {
        if (e.target.files && e.target.files[0]) {
          try {
            const imported = await parseImportFile(e.target.files[0]);
            if (confirm(`发现 ${imported.length} 条记录。这将覆盖当前数据。是否继续？`)) setRecords(imported);
          } catch (err) { alert("导入失败。"); }
        }
      };

      const handleJSONExport = () => {
         const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records));
         const node = document.createElement('a');
         node.setAttribute("href", dataStr);
         node.setAttribute("download", "overtime_backup.json");
         document.body.appendChild(node); node.click(); node.remove();
      };

      return (
        <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 flex flex-col h-screen overflow-hidden transition-colors duration-300">
          <header className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-6 py-4 flex justify-between items-center shadow-sm z-10 shrink-0">
            <div className="flex items-center gap-3"><div className="bg-slate-800 dark:bg-slate-950 p-2 rounded-lg text-white"><Briefcase size={24} /></div><div><h1 className="text-xl font-bold text-slate-800 dark:text-white leading-tight">加班记录助手 Pro</h1><p className="text-xs text-slate-500 dark:text-slate-400">专业的工时管理工具</p></div></div>
            <div className="flex gap-3 items-center">
               <div className="hidden md:flex items-center bg-slate-100 dark:bg-slate-700 rounded-lg p-1 mr-2 border border-slate-200 dark:border-slate-600">
                  <button onClick={() => adjustScale(-0.1)} className="p-1.5 px-2.5 text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-600 rounded-md transition-all text-xs font-bold" title="减小字号">A-</button>
                  <div className="w-[1px] h-4 bg-slate-300 dark:bg-slate-500 mx-1"></div>
                  <button onClick={() => adjustScale(0.1)} className="p-1.5 px-2.5 text-slate-600 dark:text-slate-300 hover:bg-white dark:hover:bg-slate-600 rounded-md transition-all text-sm font-bold" title="增大字号">A+</button>
               </div>
               <button onClick={toggleTheme} className="p-2.5 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors mr-2">{isDarkMode ? <Sun size={20} /> : <Moon size={20} />}</button>
               <label className="hidden md:flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 cursor-pointer transition-colors"><Upload size={16} /><span>恢复</span><input type="file" accept=".json" onChange={handleImport} className="hidden" /></label>
               <button onClick={handleJSONExport} className="hidden md:flex items-center gap-2 px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-600 transition-colors"><Download size={16} /> 备份</button>
               <button onClick={() => exportToExcel(records)} className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-lg shadow-sm hover:shadow transition-all"><Download size={16} /><span>导出报表</span></button>
            </div>
          </header>
          <main className="flex-1 overflow-hidden">
            <div className="h-full flex flex-col lg:flex-row gap-4 p-4">
              <div className="flex-1 lg:flex-[2] overflow-hidden flex flex-col"><Calendar currentDate={currentDate} onDateChange={setCurrentDate} records={records} onDayClick={handleDayClick} fontScale={calendarScale} /></div>
              <div className="flex-1 lg:flex-1 bg-white dark:bg-slate-800 border dark:border-slate-700 rounded p-4 overflow-hidden shadow-sm"><StatsPanel records={records} hourlyRate={hourlyRate} setHourlyRate={setHourlyRate} currentMonth={currentDate} /></div>
            </div>
          </main>
          <RecordModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={handleSaveRecord} onDelete={handleDeleteRecord} selectedDate={selectedDate} existingRecord={editingRecord} />
        </div>
      );
    };

    // --- MOUNT ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
