  <script>
    function _makeIcon(size) {
      const c = document.createElement('canvas'); c.width = c.height = size;
      const ctx = c.getContext('2d'); const r = size*0.21;
      ctx.beginPath(); ctx.moveTo(r,0); ctx.lineTo(size-r,0); ctx.quadraticCurveTo(size,0,size,r);
      ctx.lineTo(size,size-r); ctx.quadraticCurveTo(size,size,size-r,size);
      ctx.lineTo(r,size); ctx.quadraticCurveTo(0,size,0,size-r);
      ctx.lineTo(0,r); ctx.quadraticCurveTo(0,0,r,0); ctx.closePath();
      const g = ctx.createLinearGradient(0,0,size,size);
      g.addColorStop(0,'#3b82f6'); g.addColorStop(1,'#6366f1');
      ctx.fillStyle=g; ctx.fill();
      const s=size/192; ctx.strokeStyle='white'; ctx.lineCap='round';
      ctx.beginPath();
      const rx=56*s,ry=48*s,rw=80*s,rh=96*s,cr=8*s;
      ctx.moveTo(rx+cr,ry); ctx.lineTo(rx+rw-cr,ry); ctx.quadraticCurveTo(rx+rw,ry,rx+rw,ry+cr);
      ctx.lineTo(rx+rw,ry+rh-cr); ctx.quadraticCurveTo(rx+rw,ry+rh,rx+rw-cr,ry+rh);
      ctx.lineTo(rx+cr,ry+rh); ctx.quadraticCurveTo(rx,ry+rh,rx,ry+rh-cr);
      ctx.lineTo(rx,ry+cr); ctx.quadraticCurveTo(rx,ry,rx+cr,ry); ctx.closePath();
      ctx.lineWidth=8*s; ctx.stroke();
      [[72,80,120,80],[72,100,120,100],[72,120,100,120]].forEach(([x1,y1,x2,y2])=>{
        ctx.beginPath(); ctx.moveTo(x1*s,y1*s); ctx.lineTo(x2*s,y2*s); ctx.lineWidth=7*s; ctx.stroke();
      });
      ctx.beginPath(); ctx.arc(140*s,148*s,28*s,0,Math.PI*2);
      ctx.fillStyle='#10b981'; ctx.fill();
      ctx.strokeStyle='white'; ctx.lineWidth=5*s;
      ctx.beginPath(); ctx.moveTo(140*s,136*s); ctx.lineTo(140*s,148*s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(140*s,148*s); ctx.lineTo(150*s,158*s); ctx.stroke();
      return c.toDataURL('image/png');
    }

    // Apple touch icon (manifest.json 已静态引用，无需动态注入)
    const _al = document.createElement('link');
    _al.rel = 'apple-touch-icon'; _al.href = _makeIcon(180);
    document.head.appendChild(_al);

<body>
  <div id="root"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;
    // Destructure icon globals
    const { Download, Upload, Briefcase, Moon, Sun, ChevronLeft, ChevronRight, X, Save,
            Trash2, Clock, CalendarDays, TrendingUp, Calculator, BarChart2, Menu, Plus, Settings } = window;
    const PieIcon = window.PieIcon;
    const { Solar, Lunar, HolidayUtil } = window;

    // Chart.js wrapper components (replaces Recharts)
    const PieChartComponent = ({ data, colors }) => {
      const ref = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!ref.current || !data || data.length === 0) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        chartRef.current = new Chart(ref.current, {
          type: 'doughnut',
          data: {
            labels: data.map(d => d.name),
            datasets: [{ data: data.map(d => d.value), backgroundColor: colors, borderWidth: 3, borderColor: '#fff', hoverOffset: 4 }]
          },
          options: {
            responsive: true, maintainAspectRatio: false, cutout: '62%',
            plugins: {
              legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 12, usePointStyle: true } },
              tooltip: { callbacks: { label: ctx => ' ' + ctx.label + ': ' + ctx.parsed + 'h' } }
            }
          }
        });
        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      }, [JSON.stringify(data)]);
      return React.createElement('canvas', { ref });
    };

    const BarChartComponent = ({ data }) => {
      const ref = useRef(null);
      const chartRef = useRef(null);
      useEffect(() => {
        if (!ref.current || !data || data.length === 0) return;
        if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
        chartRef.current = new Chart(ref.current, {
          type: 'bar',
          data: {
            labels: data.map(d => d.name),
            datasets: [
              { label: '加班', data: data.map(d => d['加班']), backgroundColor: '#3b82f6', borderRadius: 3, barThickness: 10 },
              { label: '请假', data: data.map(d => d['请假']), backgroundColor: '#a78bfa', borderRadius: 3, barThickness: 10 }
            ]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: {
              legend: { position: 'top', labels: { font: { size: 11 }, padding: 12, usePointStyle: true } },
              tooltip: { callbacks: { label: ctx => ' ' + ctx.dataset.label + ': ' + ctx.parsed.y + 'h' } }
            },
            scales: {
              x: { grid: { display: false }, ticks: { font: { size: 10 }, color: '#94a3b8' } },
              y: { grid: { color: '#f1f5f9' }, ticks: { font: { size: 10 }, color: '#94a3b8' }, border: { display: false } }
            }
          }
        });
        return () => { if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; } };
      }, [JSON.stringify(data)]);
      return React.createElement('canvas', { ref });
    };

    const RecordCategory = { OVERTIME: '加班', LEAVE: '请假' };
    const OvertimeType = { WEEKDAY: '平日加班', WEEKEND: '周末加班', HOLIDAY: '节假日加班' };
    const LeaveType = { COMPENSATORY: '调休', PERSONAL: '事假', SICK: '病假', ANNUAL: '年假', OTHER: '其他' };

    // --- UTILS ---
    const exportToExcel = (records) => {
      if (records.length === 0) { alert("暂无记录可导出。"); return; }
      const dataToExport = records.map(record => {
        const dateObj = new Date(record.date);
        const dayOfWeek = dateObj.toLocaleDateString('zh-CN', { weekday: 'long' });
        return { "日期": record.date, "星期": dayOfWeek, "分类": record.category, "类型": record.type, "开始时间": record.startTime, "结束时间": record.endTime, "时长(小时)": record.duration, "备注": record.note };
      });
      const ws = XLSX.utils.json_to_sheet(dataToExport);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "考勤记录");
      const now = new Date();
      const today = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
      XLSX.writeFile(wb, `考勤记录_${today}.xlsx`);
    };

    const parseImportFile = (file) => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const parsed = JSON.parse(e.target?.result);
          if (Array.isArray(parsed)) resolve(parsed.map(p => ({ ...p, category: p.category || '加班', type: p.type || '平日加班' })));
          else reject(new Error("无效格式"));
        } catch (err) { reject(err); }
      };
      reader.onerror = reject;
      reader.readAsText(file);
    });

    // --- SETTINGS HELPERS ---
    const DEFAULT_SETTINGS = {
      otDefaultStart: '18:00',
      otDefaultEnd:   '20:00',
      leaveDefaultStart: '08:00',
      leaveDefaultEnd:   '17:00',
      restPeriods: [
        { id: '1', start: '12:00', end: '13:00', label: '午休' },
        { id: '2', start: '17:00', end: '18:00', label: '晚餐' },
      ]
    };
    const loadSettings = () => {
      try {
        const s = localStorage.getItem('ot_settings');
        return s ? { ...DEFAULT_SETTINGS, ...JSON.parse(s) } : DEFAULT_SETTINGS;
      } catch { return DEFAULT_SETTINGS; }
    };
    const saveSettings = (s) => localStorage.setItem('ot_settings', JSON.stringify(s));

    // calcDuration with dynamic rest periods
    const calcDuration = (start, end, restPeriods) => {
      const toMin = t => { const [h,m] = t.split(':').map(Number); return h*60+m; };
      let startMin = toMin(start), endMin = toMin(end);
      if (endMin <= startMin) endMin += 24*60;
      let rest = 0;
      (restPeriods || []).forEach(p => {
        const rs = toMin(p.start), re = toMin(p.end);
        if (startMin < re && endMin > rs) rest += (re - rs) / 60;
      });
      return parseFloat(Math.max((endMin - startMin)/60 - rest, 0).toFixed(1));
    };

    // --- COMPONENT: SettingsModal ---
    const SettingsModal = ({ isOpen, onClose, settings, onSave }) => {
      const [otStart, setOtStart]     = useState(settings.otDefaultStart);
      const [otEnd, setOtEnd]         = useState(settings.otDefaultEnd);
      const [lvStart, setLvStart]     = useState(settings.leaveDefaultStart);
      const [lvEnd, setLvEnd]         = useState(settings.leaveDefaultEnd);
      const [rests, setRests]         = useState(settings.restPeriods);

      useEffect(() => {
        if (isOpen) {
          setOtStart(settings.otDefaultStart);
          setOtEnd(settings.otDefaultEnd);
          setLvStart(settings.leaveDefaultStart);
          setLvEnd(settings.leaveDefaultEnd);
          setRests(settings.restPeriods);
        }
      }, [isOpen]);

      const addRest = () => setRests(prev => [...prev, { id: Date.now().toString(), start: '12:00', end: '13:00', label: '休息' }]);
      const removeRest = (id) => setRests(prev => prev.filter(r => r.id !== id));
      const updateRest = (id, field, val) => setRests(prev => prev.map(r => r.id === id ? { ...r, [field]: val } : r));

      const handleSave = () => {
        onSave({ otDefaultStart: otStart, otDefaultEnd: otEnd, leaveDefaultStart: lvStart, leaveDefaultEnd: lvEnd, restPeriods: rests });
        onClose();
      };

      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center" onClick={onClose}>
          <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" />
          <div className="relative w-full sm:max-w-md bottom-sheet sm:rounded-2xl bg-white dark:bg-slate-900 shadow-2xl anim-slide-up sm:anim-scale-in overflow-hidden max-h-[90vh] flex flex-col" onClick={e => e.stopPropagation()}>
            {/* Header */}
            <div className="bg-gradient-to-r from-slate-700 to-slate-800 px-5 py-4 flex items-center justify-between shrink-0">
              <div className="flex items-center gap-2">
                <Settings size={16} className="text-white/80" />
                <h2 className="text-white font-bold text-base">工时设置</h2>
              </div>
              <button onClick={onClose} className="p-1.5 rounded-lg hover:bg-white/10 transition"><X size={18} className="text-white/80" /></button>
            </div>

            <div className="overflow-y-auto flex-1 p-5 space-y-5">
              {/* 加班默认时间 */}
              <div>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">加班默认时间</p>
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                  {[['开始', otStart, setOtStart], ['结束', otEnd, setOtEnd]].map(([label, val, setter]) => (
                    <div key={label}>
                      <label className="block text-xs font-semibold text-slate-400 mb-1.5">{label}</label>
                      <input type="time" value={val} onChange={e => setter(e.target.value)}
                        className="w-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-2.5 rounded-xl text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  ))}
                </div>
              </div>

              {/* 请假默认时间 */}
              <div>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">请假默认时间</p>
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                  {[['开始', lvStart, setLvStart], ['结束', lvEnd, setLvEnd]].map(([label, val, setter]) => (
                    <div key={label}>
                      <label className="block text-xs font-semibold text-slate-400 mb-1.5">{label}</label>
                      <input type="time" value={val} onChange={e => setter(e.target.value)}
                        className="w-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-2.5 rounded-xl text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                  ))}
                </div>
              </div>

              {/* 休息时段 */}
              <div>
                <div className="flex items-center justify-between mb-3">
                  <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">休息时段（自动扣除）</p>
                  <button onClick={addRest} className="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 text-xs font-semibold hover:bg-blue-100 dark:hover:bg-blue-900/50 transition">
                    <Plus size={12} /> 添加
                  </button>
                </div>
                {rests.length === 0 && (
                  <p className="text-xs text-slate-400 text-center py-3">暂无休息时段，不扣除任何时间</p>
                )}
                <div className="space-y-2">
                  {rests.map(r => (
                    <div key={r.id} className="flex items-center gap-2 p-3 bg-slate-50 dark:bg-slate-800 rounded-xl">
                      <input value={r.label} onChange={e => updateRest(r.id, 'label', e.target.value)} placeholder="备注"
                        className="w-16 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-2 py-1.5 rounded-lg text-xs text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-400" />
                      <input type="time" value={r.start} onChange={e => updateRest(r.id, 'start', e.target.value)}
                        className="flex-1 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-2 py-1.5 rounded-lg text-xs text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-400" />
                      <span className="text-slate-400 text-xs">—</span>
                      <input type="time" value={r.end} onChange={e => updateRest(r.id, 'end', e.target.value)}
                        className="flex-1 border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 px-2 py-1.5 rounded-lg text-xs text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-400" />
                      <button onClick={() => removeRest(r.id)} className="p-1.5 rounded-lg text-red-400 hover:bg-red-50 dark:hover:bg-red-900/20 transition shrink-0">
                        <Trash2 size={14} />
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            {/* Footer */}
            <div className="px-5 py-4 border-t border-slate-100 dark:border-slate-700 shrink-0">
              <button onClick={handleSave}
                className="w-full bg-gradient-to-r from-blue-500 to-indigo-600 text-white py-3 rounded-xl text-sm font-bold transition-all active:scale-95 shadow-lg shadow-blue-100 dark:shadow-blue-900/30">
                保存设置
              </button>
            </div>
          </div>
        </div>
      );
    };

    // --- MODAL: Record Entry (Mobile-first bottom sheet / PC centered) ---
    const RecordModal = ({ isOpen, onClose, onSave, onDelete, selectedDate, existingRecord, settings }) => {
      const [category, setCategory] = useState(RecordCategory.OVERTIME);
      const [startTime, setStartTime] = useState(settings.otDefaultStart);
      const [endTime, setEndTime] = useState(settings.otDefaultEnd);
      const [duration, setDuration] = useState(() => calcDuration(settings.otDefaultStart, settings.otDefaultEnd, settings.restPeriods));
      const [type, setType] = useState(OvertimeType.WEEKDAY);
      const [note, setNote] = useState('');

      useEffect(() => {
        if (isOpen) {
          if (existingRecord) {
            setCategory(existingRecord.category || RecordCategory.OVERTIME);
            setStartTime(existingRecord.startTime);
            setEndTime(existingRecord.endTime);
            setDuration(existingRecord.duration);
            setType(existingRecord.type);
            setNote(existingRecord.note);
          } else {
            const isWeekend = selectedDate.getDay() === 0 || selectedDate.getDay() === 6;
            setCategory(RecordCategory.OVERTIME);
            const s = settings.otDefaultStart, e = settings.otDefaultEnd;
            setStartTime(s); setEndTime(e);
            setDuration(calcDuration(s, e, settings.restPeriods));
            setType(isWeekend ? OvertimeType.WEEKEND : OvertimeType.WEEKDAY);
            setNote('');
          }
        }
      }, [isOpen, existingRecord, selectedDate]);

      useEffect(() => {
        if (!isOpen) return;
        if (category === RecordCategory.OVERTIME) {
          const isLeaveType = Object.values(LeaveType).includes(type);
          if (isLeaveType) setType(OvertimeType.WEEKDAY);
          const ls = settings.leaveDefaultStart, le = settings.leaveDefaultEnd;
          const os = settings.otDefaultStart, oe = settings.otDefaultEnd;
          if (startTime === ls && endTime === le) { setStartTime(os); setEndTime(oe); calculateAndSetDuration(os, oe); }
        } else {
          const isOtType = Object.values(OvertimeType).includes(type);
          if (isOtType) setType(LeaveType.COMPENSATORY);
          const ls = settings.leaveDefaultStart, le = settings.leaveDefaultEnd;
          const os = settings.otDefaultStart, oe = settings.otDefaultEnd;
          if (startTime === os && endTime === oe) { setStartTime(ls); setEndTime(le); calculateAndSetDuration(ls, le); }
        }
      }, [category]);

      const calculateAndSetDuration = (start, end) => {
        setDuration(calcDuration(start, end, settings.restPeriods));
      };

      const handleTimeChange = (field, value) => {
        const newStart = field === 'start' ? value : startTime;
        const newEnd = field === 'end' ? value : endTime;
        if (field === 'start') setStartTime(value);
        if (field === 'end') setEndTime(value);
        calculateAndSetDuration(newStart, newEnd);
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        const record = {
          id: existingRecord?.id || crypto.randomUUID(),
          date: `${selectedDate.getFullYear()}-${String(selectedDate.getMonth() + 1).padStart(2, '0')}-${String(selectedDate.getDate()).padStart(2, '0')}`,
          startTime, endTime, duration: Number(duration), category, type, note
        };
        onSave(record); onClose();
      };

      if (!isOpen) return null;

      const dateLabel = selectedDate.toLocaleDateString('zh-CN', { month: 'long', day: 'numeric', weekday: 'long' });
      const isOT = category === RecordCategory.OVERTIME;

      return (
        <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center" onClick={(e) => e.target === e.currentTarget && onClose()}>
          {/* Backdrop */}
          <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} />
          
          {/* Sheet */}
          <div className="relative w-full sm:max-w-md bottom-sheet sm:rounded-2xl bg-white dark:bg-slate-900 shadow-2xl anim-slide-up sm:anim-scale-in overflow-hidden">
            {/* Handle bar (mobile) */}
            <div className="sm:hidden flex justify-center pt-3 pb-1">
              <div className="w-10 h-1 rounded-full bg-slate-200 dark:bg-slate-700" />
            </div>

            {/* Header */}
            <div className={`px-5 py-4 flex justify-between items-center ${isOT ? 'bg-gradient-to-r from-blue-500 to-indigo-600' : 'bg-gradient-to-r from-purple-500 to-pink-500'}`}>
              <div>
                <p className="text-white/80 text-xs font-medium uppercase tracking-wider">记录工时</p>
                <h2 className="text-white font-bold text-lg leading-tight">{dateLabel}</h2>
              </div>
              <button onClick={onClose} className="p-2 rounded-full bg-white/20 hover:bg-white/30 transition-colors">
                <X size={18} className="text-white" />
              </button>
            </div>

            <form onSubmit={handleSubmit} className="p-5 space-y-4 overflow-y-auto max-h-[70vh]">
              {/* Category toggle */}
              <div className="flex gap-2 p-1 bg-slate-100 dark:bg-slate-800 rounded-xl">
                <button type="button" onClick={() => setCategory(RecordCategory.OVERTIME)}
                  className={`flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all ${isOT ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500'}`}>
                  ⏰ 加班
                </button>
                <button type="button" onClick={() => setCategory(RecordCategory.LEAVE)}
                  className={`flex-1 py-2.5 rounded-lg text-sm font-semibold transition-all ${!isOT ? 'bg-white dark:bg-slate-700 text-purple-600 dark:text-purple-400 shadow-sm' : 'text-slate-500'}`}>
                  🌿 请假
                </button>
              </div>

              {/* Time row */}
              <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                {[['开始时间', 'start', startTime], ['结束时间', 'end', endTime]].map(([label, field, val]) => (
                  <div key={field}>
                    <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">{label}</label>
                    <input type="time" required value={val} onChange={(e) => handleTimeChange(field, e.target.value)}
                      className="w-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition" />
                  </div>
                ))}
              </div>

              {/* Duration */}
              <div>
                <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">时长（小时）</label>
                <div className="flex items-center gap-3">
                  <input type="number" step="0.5" min="0" required value={duration} onChange={(e) => setDuration(parseFloat(e.target.value))}
                    className="flex-1 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition" />
                  <div className={`px-4 py-3 rounded-xl text-sm font-bold ${isOT ? 'bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400' : 'bg-purple-50 text-purple-600 dark:bg-purple-900/30 dark:text-purple-400'}`}>
                    {duration}h
                  </div>
                </div>
              </div>

              {/* Type */}
              <div>
                <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">类型</label>
                <select value={type} onChange={(e) => setType(e.target.value)}
                  className="w-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                  {isOT ? Object.values(OvertimeType).map(t => <option key={t} value={t}>{t}</option>) : Object.values(LeaveType).map(t => <option key={t} value={t}>{t}</option>)}
                </select>
              </div>

              {/* Note */}
              <div>
                <label className="block text-xs font-semibold text-slate-400 mb-1.5 uppercase tracking-wider">备注</label>
                <textarea rows={2} value={note} onChange={(e) => setNote(e.target.value)} placeholder="选填..."
                  className="w-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 p-3 rounded-xl text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition resize-none" />
              </div>

              {/* Actions */}
              <div className="flex gap-3 pt-1">
                {existingRecord && (
                  <button type="button" onClick={() => { onDelete(existingRecord.id); onClose(); }}
                    className="p-3 rounded-xl border-2 border-red-200 dark:border-red-900 text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20 transition">
                    <Trash2 size={20} />
                  </button>
                )}
                <button type="submit"
                  className={`flex-1 py-3 rounded-xl flex items-center justify-center gap-2 font-semibold text-white shadow-lg transition-all active:scale-95 ${isOT ? 'bg-gradient-to-r from-blue-500 to-indigo-600 hover:from-blue-600 hover:to-indigo-700 shadow-blue-200 dark:shadow-blue-900' : 'bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 shadow-purple-200 dark:shadow-purple-900'}`}>
                  <Save size={18} /> 保存记录
                </button>
              </div>
            </form>
          </div>
        </div>
      );
    };

    // --- COMPONENT: StatsPanel ---
    const RANGE_OPTIONS = [
      { label: '近3个月', value: '3m' },
      { label: '近6个月', value: '6m' },
      { label: '近12个月', value: '12m' },
      { label: '今年', value: 'year' },
      { label: '自定义', value: 'custom' },
    ];

    const StatsPanel = ({ records, hourlyRate, setHourlyRate, currentMonth }) => {
      const [range, setRange] = useState('6m');
      const [customStart, setCustomStart] = useState(() => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()-2).padStart(2,'0') === '-1' ? '01' : String(n.getMonth()-1).padStart(2,'0')}`; });
      const [customEnd, setCustomEnd] = useState(() => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}`; });
      const [calcRate, setCalcRate] = useState(hourlyRate);
      const [calcResult, setCalcResult] = useState(null);
      const [showCalc, setShowCalc] = useState(false);
      const [calcStart, setCalcStart] = useState(() => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-01`; });
      const [calcEnd, setCalcEnd] = useState(() => { const n = new Date(); return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`; });
      const [detailFilter, setDetailFilter] = useState('all'); // 'all' | 'ot' | 'leave'

      // ── 当前月概览 ──
      const y = currentMonth.getFullYear(), m = String(currentMonth.getMonth()+1).padStart(2,'0');
      const currentMonthStr = `${y}-${m}`;
      const cmRecords = records.filter(r => r.date.startsWith(currentMonthStr));
      const cmOt = cmRecords.filter(r => r.category === RecordCategory.OVERTIME || !r.category);
      const cmLeave = cmRecords.filter(r => r.category === RecordCategory.LEAVE);
      const cmOtHours = cmOt.reduce((a, c) => a + c.duration, 0);
      const cmLeaveHours = cmLeave.reduce((a, c) => a + c.duration, 0);

      // ── 今年累计 ──
      const thisYear = currentMonth.getFullYear();
      const yearRecords = records.filter(r => r.date.startsWith(String(thisYear)));
      const yearOtDays = new Set(yearRecords.filter(r => r.category !== RecordCategory.LEAVE).map(r => r.date)).size;
      const yearOtHours = yearRecords.filter(r => r.category !== RecordCategory.LEAVE).reduce((a, c) => a + c.duration, 0);

      // ── 趋势范围计算 ──
      const getTrendMonths = () => {
        const now = new Date();
        if (range === 'year') {
          const count = now.getMonth() + 1;
          return Array.from({ length: count }, (_, i) => {
            const d = new Date(now.getFullYear(), i, 1);
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
          });
        }
        if (range === 'custom') {
          if (!customStart || !customEnd || customStart > customEnd) return [];
          const [sy, sm] = customStart.split('-').map(Number);
          const [ey, em] = customEnd.split('-').map(Number);
          const months = [];
          let cy2 = sy, cm2 = sm;
          while (cy2 < ey || (cy2 === ey && cm2 <= em)) {
            months.push(`${cy2}-${String(cm2).padStart(2,'0')}`);
            cm2++; if (cm2 > 12) { cm2 = 1; cy2++; }
            if (months.length > 36) break;
          }
          return months;
        }
        const count = range === '3m' ? 3 : range === '12m' ? 12 : 6;
        return Array.from({ length: count }, (_, i) => {
          const d = new Date(now); d.setMonth(d.getMonth() - (count - 1 - i));
          return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
        });
      };

      const trendMonths = getTrendMonths();
      const trendData = trendMonths.map(ms => {
        const mr = records.filter(r => r.date.startsWith(ms));
        let ot = 0, leave = 0;
        mr.forEach(r => r.category === RecordCategory.LEAVE ? leave += r.duration : ot += r.duration);
        const label = ms.slice(5) + '月'; // "03月"
        return { name: label, '加班': parseFloat(ot.toFixed(1)), '请假': parseFloat(leave.toFixed(1)) };
      });

      // ── 趋势范围内统计 ──
      const trendRecords = records.filter(r => trendMonths.some(ms => r.date.startsWith(ms)));
      const trendOtRecords = trendRecords.filter(r => r.category !== RecordCategory.LEAVE);
      const trendOtHours = trendOtRecords.reduce((a, c) => a + c.duration, 0);
      const avgMonthlyOt = trendMonths.length > 0 ? (trendOtHours / trendMonths.length) : 0;
      const maxMonth = trendData.reduce((best, d) => d['加班'] > (best?.['加班'] ?? -1) ? d : best, null);

      // ── 本月饼图 ──
      let otBreakdown = { weekday: 0, weekend: 0, holiday: 0 };
      cmOt.forEach(r => {
        if (r.type === OvertimeType.WEEKEND) otBreakdown.weekend += r.duration;
        else if (r.type === OvertimeType.HOLIDAY) otBreakdown.holiday += r.duration;
        else otBreakdown.weekday += r.duration;
      });
      const pieData = [
        { name: '平日', value: parseFloat(otBreakdown.weekday.toFixed(1)) },
        { name: '周末', value: parseFloat(otBreakdown.weekend.toFixed(1)) },
        { name: '节假日', value: parseFloat(otBreakdown.holiday.toFixed(1)) }
      ].filter(i => i.value > 0);
      const pieColors = ['#3b82f6', '#f97316', '#ef4444'];

      // ── 明细列表（所选趋势范围内） ──
      const detailRecords = [...trendRecords]
        .filter(r => detailFilter === 'all' || (detailFilter === 'ot' ? r.category !== RecordCategory.LEAVE : r.category === RecordCategory.LEAVE))
        .sort((a, b) => b.date.localeCompare(a.date));

      // ── 加班费核算 ──
      const handleCalculate = () => {
        const tr = records.filter(r => r.date >= calcStart && r.date <= calcEnd);
        let wkd = 0, wke = 0, hol = 0, lv = 0;
        tr.forEach(r => {
          if (r.category === RecordCategory.LEAVE) lv += r.duration;
          else if (r.type === OvertimeType.WEEKEND) wke += r.duration;
          else if (r.type === OvertimeType.HOLIDAY) hol += r.duration;
          else wkd += r.duration;
        });
        const weighted = wkd*1.5 + wke*2.0 + hol*3.0;
        const net = Math.max(0, weighted - lv);
        setCalcResult({ weekdayOt: wkd.toFixed(1), weekendOt: wke.toFixed(1), holidayOt: hol.toFixed(1), weightedOt: weighted.toFixed(1), leave: lv.toFixed(1), total: (net * calcRate).toFixed(2) });
        if (calcRate !== hourlyRate) setHourlyRate(calcRate);
      };

      const typeBadge = (r) => {
        if (r.category === RecordCategory.LEAVE) return <span className="px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-violet-500 text-white">{r.type || '请假'}</span>;
        if (r.type === OvertimeType.WEEKEND) return <span className="px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-orange-400 text-white">周末</span>;
        if (r.type === OvertimeType.HOLIDAY) return <span className="px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-red-500 text-white">节假日</span>;
        return <span className="px-1.5 py-0.5 rounded-md text-[10px] font-bold bg-blue-500 text-white">平日</span>;
      };

      return (
        <div className="space-y-4 pb-6">

          {/* ── 1. 当月概览 ── */}
          <h3 className="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
            {currentMonth.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' })} · 概览
          </h3>
          <div className="grid grid-cols-2 gap-3">
            <div className="grad-border-blue p-4 rounded-2xl">
              <div className="flex items-center gap-2 text-blue-500 dark:text-blue-400 mb-2">
                <div className="p-1.5 bg-blue-50 dark:bg-blue-900/40 rounded-lg"><Clock size={14} /></div>
                <span className="text-xs font-semibold">加班时长</span>
              </div>
              <div className="text-3xl font-bold text-slate-800 dark:text-white">{cmOtHours.toFixed(1)}</div>
              <div className="text-xs text-slate-400 mt-0.5">小时 · {cmOt.length} 天</div>
            </div>
            <div className="grad-border-purple p-4 rounded-2xl">
              <div className="flex items-center gap-2 text-purple-500 dark:text-purple-400 mb-2">
                <div className="p-1.5 bg-purple-50 dark:bg-purple-900/40 rounded-lg"><CalendarDays size={14} /></div>
                <span className="text-xs font-semibold">请假 / 调休</span>
              </div>
              <div className="text-3xl font-bold text-slate-800 dark:text-white">{cmLeaveHours.toFixed(1)}</div>
              <div className="text-xs text-slate-400 mt-0.5">小时 · {cmLeave.length} 天</div>
            </div>
          </div>

          {/* ── 2. 今年累计 ── */}
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4 rounded-2xl shadow-sm">
              <div className="text-xs text-slate-400 mb-1 font-medium">今年累计加班</div>
              <div className="text-2xl font-bold text-slate-800 dark:text-white">{yearOtHours.toFixed(1)}<span className="text-sm font-normal text-slate-400 ml-1">h</span></div>
              <div className="text-xs text-slate-400 mt-0.5">{yearOtDays} 天 · {thisYear}年</div>
            </div>
            <div className="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 p-4 rounded-2xl shadow-sm">
              <div className="text-xs text-slate-400 mb-1 font-medium">月均加班</div>
              <div className="text-2xl font-bold text-slate-800 dark:text-white">{avgMonthlyOt.toFixed(1)}<span className="text-sm font-normal text-slate-400 ml-1">h</span></div>
              <div className="text-xs text-slate-400 mt-0.5">基于所选时间范围</div>
            </div>
          </div>

          {/* ── 3. 本月构成饼图 ── */}
          <div className="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm">
            <h3 className="flex items-center gap-2 text-sm font-semibold text-slate-700 dark:text-slate-300 mb-3">
              <PieIcon size={15} className="text-indigo-500" /> 本月工时构成
            </h3>
            <div className="h-[160px]">
              {pieData.length > 0
                ? <PieChartComponent data={pieData} colors={pieColors} />

          <div className="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm">
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <h3 className="flex items-center gap-2 text-sm font-semibold text-slate-700 dark:text-slate-300">

              </h3>
              <div className="flex gap-1 flex-wrap">
                {RANGE_OPTIONS.map(o => (
                  <button key={o.value} onClick={() => setRange(o.value)}
                    className={`px-2.5 py-1 rounded-lg text-xs font-semibold transition ${range === o.value ? 'bg-blue-500 text-white' : 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600'}`}>
                    {o.label}
                  </button>

            {range === 'custom' && (
              <div className="flex items-center gap-2 mb-3 flex-wrap">
                <input type="month" value={customStart} onChange={e => setCustomStart(e.target.value)}
                  className="flex-1 min-w-[130px] border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-1.5 rounded-xl text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
                <span className="text-slate-400 text-sm">—</span>
                <input type="month" value={customEnd} onChange={e => setCustomEnd(e.target.value)}
                  className="flex-1 min-w-[130px] border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-1.5 rounded-xl text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-400" />
              </div>
            )}

            {maxMonth && maxMonth['加班'] > 0 && (
              <div className="mb-3 flex items-center gap-1.5 text-xs text-slate-500 dark:text-slate-400">
                <span className="w-2 h-2 rounded-full bg-amber-400 inline-block"></span>
                加班最多：<span className="font-semibold text-slate-700 dark:text-slate-200">{maxMonth.name} {maxMonth['加班']}h</span>
              </div>
            )}

            <div className="h-[200px]">
              {trendData.length > 0
                ? <BarChartComponent data={trendData} />
                : <div className="h-full flex items-center justify-center text-slate-400 text-sm">暂无数据</div>}
            </div>
          </div>

          {/* ── 5. 明细列表 ── */}
          <div className="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm">
            <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
              <h3 className="flex items-center gap-2 text-sm font-semibold text-slate-700 dark:text-slate-300">
                <BarChart2 size={15} className="text-blue-500" /> 记录明细
                <span className="text-xs font-normal text-slate-400">（所选范围）</span>
              </h3>
              <div className="flex gap-1">
                {[['all','全部'],['ot','加班'],['leave','请假']].map(([v,l]) => (
                  <button key={v} onClick={() => setDetailFilter(v)}
                    className={`px-2.5 py-1 rounded-lg text-xs font-semibold transition ${detailFilter === v ? 'bg-blue-500 text-white' : 'bg-slate-100 dark:bg-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600'}`}>
                    {l}
                  </button>
                ))}
              </div>
            </div>
            {detailRecords.length === 0
              ? <div className="py-8 text-center text-slate-400 text-sm">所选范围内暂无记录</div>
              : <div className="space-y-2 max-h-[320px] overflow-y-auto pr-1">
                  {detailRecords.map(r => (
                    <div key={r.id} className="flex items-center gap-3 p-2.5 rounded-xl bg-slate-50 dark:bg-slate-900/60 hover:bg-slate-100 dark:hover:bg-slate-700/60 transition">
                      <div className="shrink-0 text-center w-10">
                        <div className="text-xs font-bold text-slate-700 dark:text-slate-200">{r.date.slice(5).replace('-','/')}</div>
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-1.5 flex-wrap">
                          {typeBadge(r)}
                          <span className="text-xs font-bold text-slate-700 dark:text-slate-200">{r.duration}h</span>
                          {r.note && <span className="text-xs text-slate-400 truncate">{r.note}</span>}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
            }
          </div>

          {/* ── 6. 加班费核算（折叠） ── */}
          <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm overflow-hidden">
            <button onClick={() => setShowCalc(v => !v)}
              className="w-full flex items-center justify-between px-4 py-3.5 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700/50 transition">
              <span className="flex items-center gap-2"><Calculator size={15} className="text-amber-500" /> 加班费核算</span>
              <span className="text-slate-400 text-lg leading-none">{showCalc ? '−' : '+'}</span>
            </button>
            {showCalc && (
              <div className="px-4 pb-4 space-y-3 border-t border-slate-100 dark:border-slate-700 pt-3">
                <p className="text-xs text-slate-400">可自定义任意日期区间，适合跨月结算周期</p>
                <div className="grid grid-cols-1 gap-3 sm:grid-cols-2">
                  {[['开始日期', calcStart, setCalcStart], ['结束日期', calcEnd, setCalcEnd]].map(([label, val, setter]) => (
                    <div key={label}>
                      <label className="block text-xs font-semibold text-slate-400 mb-1.5">{label}</label>
                      <input type="date" value={val} onChange={e => setter(e.target.value)}
                        className="w-full border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 rounded-xl text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-400 transition" />
                    </div>
                  ))}
                </div>
                <div className="flex items-center gap-3">
                  <span className="text-xs font-medium text-slate-400 w-16 shrink-0">时薪 (¥)</span>
                  <input type="number" value={calcRate} onChange={e => setCalcRate(Number(e.target.value))}
                    className="flex-1 border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 px-3 py-2 rounded-xl text-sm text-slate-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-amber-400 transition" />
                </div>
                <button onClick={handleCalculate}
                  className="w-full bg-gradient-to-r from-amber-400 to-orange-500 hover:from-amber-500 hover:to-orange-600 text-white py-3 rounded-xl text-sm font-bold transition-all active:scale-95 shadow-lg shadow-amber-100 dark:shadow-amber-900/30">
                  💰 开始计算
                </button>
                {calcResult && (
                  <div className="anim-fade-up space-y-2">
                    <div className="bg-gradient-to-r from-emerald-50 to-teal-50 dark:from-emerald-900/20 dark:to-teal-900/20 p-4 rounded-xl border border-emerald-100 dark:border-emerald-800 flex justify-between items-center">
                      <span className="text-sm font-semibold text-emerald-700 dark:text-emerald-400">预计发放</span>
                      <span className="text-2xl font-bold text-emerald-600 dark:text-emerald-400">¥{calcResult.total}</span>
                    </div>
                    <div className="bg-slate-50 dark:bg-slate-900 rounded-xl p-3 text-xs space-y-2">
                      <p className="font-semibold text-slate-600 dark:text-slate-400 mb-2">计算明细</p>
                      {[['平日加班 ×1.5', calcResult.weekdayOt], ['周末加班 ×2.0', calcResult.weekendOt], ['节假加班 ×3.0', calcResult.holidayOt]].map(([label, val]) => (
                        <div key={label} className="flex justify-between text-slate-500 dark:text-slate-400">
                          <span>{label}</span><span className="font-medium">{val}h</span>
                        </div>
                      ))}
                      <div className="flex justify-between text-red-500 dark:text-red-400">
                        <span>请假扣除</span><span className="font-medium">-{calcResult.leave}h</span>
                      </div>
                      <div className="border-t border-slate-200 dark:border-slate-700 pt-2 flex justify-between font-bold text-slate-700 dark:text-slate-300">
                        <span>加权净工时</span><span>{Math.max(0, parseFloat(calcResult.weightedOt) - parseFloat(calcResult.leave)).toFixed(1)}h</span>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
          </div>

        </div>
      );
    };

    // --- COMPONENT: Calendar ---
    const Calendar = ({ currentDate, onDateChange, records, onDayClick, fontScale = 1.0 }) => {
      const [lunarInfo, setLunarInfo] = useState('');

      useEffect(() => {
        const today = new Date();
        const target = (currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear()) ? today : new Date(currentDate.getFullYear(), currentDate.getMonth(), 1);
        updateLunar(target);
      }, [currentDate]);

      const updateLunar = (date) => {
        const solar = Solar.fromYmd(date.getFullYear(), date.getMonth()+1, date.getDate());
        const lunar = solar.getLunar();
        let info = `农历${lunar.getYearInGanZhi()}年 ${lunar.getMonthInChinese()}月${lunar.getDayInChinese()} · ${lunar.getYearShengXiao()}年`;
        const jq = lunar.getJieQi(); if (jq) info += ` · ${jq}`;
        const fests = [...solar.getFestivals(), ...lunar.getFestivals()]; if (fests.length) info += ` · ${fests.join(' ')}`;
        const hol = HolidayUtil.getHoliday(date.getFullYear(), date.getMonth()+1, date.getDate());
        if (hol) info += ` · ${hol.getName()} ${hol.isWork() ? '(班)' : '(休)'}`;
        setLunarInfo(info);
      };

      const { daysInMonth, firstDayOfMonth } = (() => {
        const year = currentDate.getFullYear(), month = currentDate.getMonth();
        return { daysInMonth: new Date(year, month+1, 0).getDate(), firstDayOfMonth: new Date(year, month, 1).getDay() };
      })();

      const getRecord = (day) => {
        const d = new Date(currentDate.getFullYear(), currentDate.getMonth(), day);
        const str = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        return records.find(r => r.date === str);
      };

      const getDayLabel = (day) => {
        const solar = Solar.fromYmd(currentDate.getFullYear(), currentDate.getMonth()+1, day);
        const lunar = solar.getLunar();
        const hol = HolidayUtil.getHoliday(currentDate.getFullYear(), currentDate.getMonth()+1, day);
        if (hol && !hol.isWork()) return { text: hol.getName(), color: 'text-red-500 font-bold' };
        if (hol && hol.isWork()) return { text: '班', color: 'text-slate-400' };
        const sf = solar.getFestivals(); if (sf.length) return { text: sf[0], color: 'text-red-500' };
        const lf = lunar.getFestivals(); if (lf.length) return { text: lf[0], color: 'text-red-500' };
        const jq = lunar.getJieQi(); if (jq) return { text: jq, color: 'text-emerald-600 dark:text-emerald-400' };
        const d = lunar.getDayInChinese(), m = lunar.getMonthInChinese();
        return { text: d === '初一' ? `${m}月` : d, color: 'text-slate-400 dark:text-slate-500' };
      };

      const getRecordStyle = (r) => {
        if (r.category === RecordCategory.LEAVE) return { bg: 'bg-violet-500', light: 'bg-violet-500 text-white' };
        if (r.type === OvertimeType.WEEKEND) return { bg: 'bg-orange-400', light: 'bg-orange-400 text-white' };
        if (r.type === OvertimeType.HOLIDAY) return { bg: 'bg-red-500', light: 'bg-red-500 text-white' };
        return { bg: 'bg-blue-500', light: 'bg-blue-500 text-white' };
      };

      const today = new Date();
      const blanks = Array.from({ length: firstDayOfMonth });
      const days = Array.from({ length: daysInMonth }, (_, i) => i+1);

      return (
        <div className="bg-white dark:bg-slate-800 h-full flex flex-col rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm overflow-hidden">
          {/* Calendar Header */}
          <div className="flex justify-between items-center px-4 py-3 border-b border-slate-100 dark:border-slate-700">
            <button onClick={() => onDateChange(new Date(currentDate.getFullYear(), currentDate.getMonth()-1, 1))}
              className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition text-slate-500 dark:text-slate-400">
              <ChevronLeft size={18} />
            </button>
            <div className="text-center">
              <h2 className="font-bold text-slate-800 dark:text-white text-base">
                {currentDate.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long' })}
              </h2>
            </div>
            <button onClick={() => onDateChange(new Date(currentDate.getFullYear(), currentDate.getMonth()+1, 1))}
              className="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-slate-700 transition text-slate-500 dark:text-slate-400">
              <ChevronRight size={18} />
            </button>
          </div>

          {/* Week headers */}
          <div className="grid grid-cols-7 bg-slate-50 dark:bg-slate-900/50">
            {['日','一','二','三','四','五','六'].map((d, i) => (
              <div key={d} className={`py-2 text-center text-xs font-bold ${i===0||i===6 ? 'text-orange-400' : 'text-slate-400 dark:text-slate-500'}`}>{d}</div>
            ))}
          </div>

          {/* Grid */}
          <div className="grid grid-cols-7 flex-1 gap-px bg-slate-100 dark:bg-slate-700 border-t border-slate-100 dark:border-slate-700">
            {blanks.map((_, i) => <div key={`b${i}`} className="bg-white dark:bg-slate-800" />)}
            {days.map(day => {
              const record = getRecord(day);
              const isToday = day === today.getDate() && currentDate.getMonth() === today.getMonth() && currentDate.getFullYear() === today.getFullYear();
              const isWeekend = new Date(currentDate.getFullYear(), currentDate.getMonth(), day).getDay() % 6 === 0;
              const label = getDayLabel(day);
              const style = record ? getRecordStyle(record) : null;

              return (
                <div key={day}
                  onClick={() => { updateLunar(new Date(currentDate.getFullYear(), currentDate.getMonth(), day)); onDayClick(new Date(currentDate.getFullYear(), currentDate.getMonth(), day)); }}
                  className={`day-cell no-select bg-white dark:bg-slate-800 p-1.5 cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-700/80 flex flex-col min-h-[56px] sm:min-h-[80px] transition-colors ${isToday ? '!bg-blue-50 dark:!bg-blue-900/20' : ''}`}>
                  
                  {/* Day number + label row */}
                  <div className="flex justify-between items-start shrink-0 gap-0.5">
                    <span style={{ fontSize: `${1.1 * fontScale}rem` }} className={`font-bold leading-none shrink-0 ${isToday ? 'text-blue-600 dark:text-blue-400' : isWeekend ? 'text-orange-500 dark:text-orange-400' : 'text-slate-700 dark:text-slate-200'}`}>
                      {day}
                    </span>
                    <span style={{ fontSize: `${0.6 * fontScale}rem`, lineHeight: '1.2' }} className={`${label.color} text-right break-all min-w-0`}>{label.text}</span>
                  </div>

                  {/* Record badge */}
                  {record && (
                    <div className={`mt-1 text-center rounded-lg px-0.5 py-0.5 shrink-0 ${style.light}`}>
                      <span style={{ fontSize: `${0.72 * fontScale}rem` }} className="font-bold leading-none">{record.duration}h</span>
                    </div>
                  )}

                  {/* Note */}
                  {record && record.note && (
                    <div className="mt-auto pt-0.5 w-full overflow-hidden" title={record.note}>
                      <p className="truncate text-slate-400 dark:text-slate-500 leading-tight" style={{ fontSize: `${0.58 * fontScale}rem` }}>{record.note}</p>
                    </div>
                  )}

                  {/* Today indicator */}
                  {isToday && !record && <div className="mt-auto w-1.5 h-1.5 rounded-full bg-blue-500 mx-auto" />}
                </div>
              );
            })}
          </div>

          {/* Lunar footer */}
          <div className="px-4 py-2 border-t border-slate-100 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50">
            <p className="text-[10px] text-slate-400 truncate text-center">{lunarInfo}</p>
          </div>
        </div>
      );
    };

    // --- COMPONENT: App ---
    const App = () => {
      const [records, setRecords] = useState([]);
      const [currentDate, setCurrentDate] = useState(new Date());
      const [hourlyRate, setHourlyRate] = useState(25);
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [fontScale, setFontScale] = useState(1.0);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [settings, setSettings] = useState(loadSettings);
      const [selectedDate, setSelectedDate] = useState(new Date());
      const [editingRecord, setEditingRecord] = useState(undefined);
      const [mobileTab, setMobileTab] = useState('calendar');
      const [showMobileMenu, setShowMobileMenu] = useState(false);

      const handleSaveSettings = (s) => { saveSettings(s); setSettings(s); };

      useEffect(() => {
        const sr = localStorage.getItem('ot_records');
        const rate = localStorage.getItem('ot_rate');
        const theme = localStorage.getItem('ot_theme');
        if (sr) {
          try {
            const parsed = JSON.parse(sr);
            const migrated = parsed.map(r => {
              if (!r.date) return r;
              const m = r.date.match(/^(\d{4})-(\d{2})-(\d{2})$/);
              if (m) {
                const utc = new Date(r.date + 'T00:00:00Z');
                if (!isNaN(utc.getTime())) {
                  const local = `${utc.getFullYear()}-${String(utc.getMonth()+1).padStart(2,'0')}-${String(utc.getDate()).padStart(2,'0')}`;
                  if (local !== r.date) return { ...r, date: local };
                }
              }
              return r;
            });
            setRecords(migrated);
          } catch(e) {}
        }
        if (rate) setHourlyRate(Number(rate));
        if (theme === 'dark') { setIsDarkMode(true); document.documentElement.classList.add('dark'); }
        const savedScale = localStorage.getItem('ot_scale');
        if (savedScale) setFontScale(Number(savedScale));
      }, []);

      useEffect(() => { localStorage.setItem('ot_records', JSON.stringify(records)); }, [records]);
      useEffect(() => { localStorage.setItem('ot_rate', String(hourlyRate)); }, [hourlyRate]);
      useEffect(() => { localStorage.setItem('ot_scale', String(fontScale)); }, [fontScale]);

      const adjustScale = (delta) => setFontScale(prev => parseFloat(Math.max(0.8, Math.min(1.4, prev + delta)).toFixed(1)));

      const toggleTheme = () => {
        const next = !isDarkMode;
        setIsDarkMode(next);
        document.documentElement.classList.toggle('dark', next);
        localStorage.setItem('ot_theme', next ? 'dark' : 'light');
      };

      const handleDayClick = (date) => {
        const str = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
        setSelectedDate(date);
        setEditingRecord(records.find(r => r.date === str));
        setIsModalOpen(true);
      };

      const handleSave = (record) => setRecords(prev => [...prev.filter(r => r.id !== record.id && r.date !== record.date), record]);
      const handleDelete = (id) => { if (confirm('确认删除？')) setRecords(prev => prev.filter(r => r.id !== id)); };

      const handleImport = async (e) => {
        if (e.target.files?.[0]) {
          try {
            const imported = await parseImportFile(e.target.files[0]);
            if (confirm(`发现 ${imported.length} 条记录，将覆盖当前数据，是否继续？`)) setRecords(imported);
          } catch { alert('导入失败，请检查文件格式。'); }
        }
        setShowMobileMenu(false);
      };

      const handleJSONExport = () => {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records));
        a.download = "overtime_backup.json"; a.click();
        setShowMobileMenu(false);
      };

      return (
        <div className={`min-h-screen bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-100 flex flex-col transition-colors duration-300`}>
          
          {/* ── HEADER ── */}
          <header className="bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200/60 dark:border-slate-700/60 px-4 py-3 flex justify-between items-center sticky top-0 z-30 shadow-sm">
            <div className="flex items-center gap-3">
              <div className="bg-gradient-to-br from-blue-500 to-indigo-600 p-2 rounded-xl shadow-lg shadow-blue-200 dark:shadow-blue-900/30">
                <Briefcase size={20} className="text-white" />
              </div>
              <div>
                <h1 className="text-base font-extrabold text-slate-800 dark:text-white leading-tight">加班记录助手</h1>
                <p className="text-[10px] text-slate-400 dark:text-slate-500 font-medium">专业工时管理</p>
              </div>
            </div>

            <div className="flex items-center gap-2">
              {/* Desktop actions */}
              <div className="hidden md:flex items-center gap-2">
                {/* Font scale controls */}
                <div className="flex items-center bg-slate-100 dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 overflow-hidden">
                  <button onClick={() => adjustScale(-0.1)} className="px-2.5 py-1.5 text-xs font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition" title="缩小字号">A-</button>
                  <div className="w-px h-4 bg-slate-300 dark:bg-slate-600" />
                  <button onClick={() => adjustScale(0.1)} className="px-2.5 py-1.5 text-sm font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 transition" title="放大字号">A+</button>
                </div>
                <label className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 cursor-pointer transition">
                  <Upload size={13} /> 恢复
                  <input type="file" accept=".json" onChange={handleImport} className="hidden" />
                </label>
                <button onClick={handleJSONExport} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-800 rounded-xl hover:bg-slate-200 dark:hover:bg-slate-700 transition">
                  <Download size={13} /> 备份
                </button>
                <button onClick={() => exportToExcel(records)} className="flex items-center gap-1.5 px-3 py-1.5 text-xs font-semibold text-white bg-gradient-to-r from-emerald-500 to-teal-500 rounded-xl hover:from-emerald-600 hover:to-teal-600 shadow-sm transition">
                  <Download size={13} /> 导出报表
                </button>
              </div>

              <button onClick={toggleTheme} className="p-2 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                {isDarkMode ? <Sun size={18} /> : <Moon size={18} />}
              </button>

              <button onClick={() => setIsSettingsOpen(true)} className="p-2 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition" title="工时设置">
                <Settings size={18} />
              </button>

              {/* Mobile menu button */}
              <button onClick={() => setShowMobileMenu(!showMobileMenu)} className="md:hidden p-2 rounded-xl text-slate-500 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition">
                <Menu size={18} />
              </button>
            </div>
          </header>

          {/* Mobile dropdown menu */}
          {showMobileMenu && (
            <div className="md:hidden fixed inset-0 z-40" onClick={() => setShowMobileMenu(false)}>
              <div className="absolute top-[60px] right-4 bg-white dark:bg-slate-800 rounded-2xl shadow-2xl border border-slate-100 dark:border-slate-700 overflow-hidden anim-scale-in" onClick={e => e.stopPropagation()}>
                {/* Font scale row */}
                <div className="flex items-center justify-between px-4 py-3 border-b border-slate-100 dark:border-slate-700">
                  <span className="text-sm font-medium text-slate-700 dark:text-slate-200">字体大小</span>
                  <div className="flex items-center gap-1 bg-slate-100 dark:bg-slate-700 rounded-xl overflow-hidden">
                    <button onClick={() => adjustScale(-0.1)} className="px-3 py-1.5 text-xs font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition">A-</button>
                    <span className="text-xs text-slate-400 w-8 text-center">{Math.round(fontScale * 100)}%</span>
                    <button onClick={() => adjustScale(0.1)} className="px-3 py-1.5 text-sm font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-600 transition">A+</button>
                  </div>
                </div>
                <label className="flex items-center gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 cursor-pointer transition">
                  <Upload size={16} className="text-slate-500" />
                  <span className="text-sm font-medium text-slate-700 dark:text-slate-200">恢复备份</span>
                  <input type="file" accept=".json" onChange={handleImport} className="hidden" />
                </label>
                <div className="h-px bg-slate-100 dark:bg-slate-700" />
                <button onClick={handleJSONExport} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                  <Download size={16} className="text-slate-500" />
                  <span className="text-sm font-medium text-slate-700 dark:text-slate-200">备份数据</span>
                </button>
                <div className="h-px bg-slate-100 dark:bg-slate-700" />
                <button onClick={() => { exportToExcel(records); setShowMobileMenu(false); }} className="w-full flex items-center gap-3 px-4 py-3 hover:bg-slate-50 dark:hover:bg-slate-700 transition">
                  <Download size={16} className="text-emerald-500" />
                  <span className="text-sm font-medium text-emerald-600 dark:text-emerald-400 font-semibold">导出 Excel 报表</span>
                </button>
              </div>
            </div>
          )}

          {/* ── MAIN CONTENT ── */}
          <main className="hidden md:flex gap-4 p-4" style={{height: 'calc(100vh - 61px)'}}>
            <div style={{flex: 3, height: '100%', overflow: 'hidden'}}>
              <Calendar currentDate={currentDate} onDateChange={setCurrentDate} records={records} onDayClick={handleDayClick} fontScale={fontScale} />
            </div>
            <div className="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl p-4 shadow-sm" style={{flex: 2, height: '100%', overflowY: 'auto'}}>
              <StatsPanel records={records} hourlyRate={hourlyRate} setHourlyRate={setHourlyRate} currentMonth={currentDate} />
            </div>
          </main>

          {/* Mobile: tab view */}
          <main className="flex-1 md:hidden overflow-hidden flex flex-col">
            <div className="flex-1 overflow-y-auto">
              {mobileTab === 'calendar' ? (
                <div className="p-3 h-full">
                  <Calendar currentDate={currentDate} onDateChange={setCurrentDate} records={records} onDayClick={handleDayClick} fontScale={fontScale} />
                </div>
              ) : (
                <div className="p-4">
                  <StatsPanel records={records} hourlyRate={hourlyRate} setHourlyRate={setHourlyRate} currentMonth={currentDate} />
                </div>
              )}
            </div>

            {/* Mobile bottom tab bar */}
            <div className="tab-bar bg-white/90 dark:bg-slate-900/90 backdrop-blur-md border-t border-slate-200/60 dark:border-slate-700/60 flex items-center justify-around px-2 pt-2 pb-safe safe-bottom shrink-0"
              style={{paddingBottom: 'max(8px, env(safe-area-inset-bottom))'}}>
              <button onClick={() => setMobileTab('calendar')}
                className={`flex flex-col items-center gap-1 px-6 py-1.5 rounded-xl transition ${mobileTab==='calendar' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 dark:text-slate-500'}`}>
                <CalendarDays size={20} />
                <span className="text-[10px] font-semibold">日历</span>
              </button>

              {/* Add button (center) */}
              <button onClick={() => { setSelectedDate(new Date()); setEditingRecord(undefined); setIsModalOpen(true); }}
                className="flex flex-col items-center -mt-6">
                <div className="w-14 h-14 rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-xl shadow-blue-300 dark:shadow-blue-900/50">
                  <Plus size={26} className="text-white" />
                </div>
                <span className="text-[10px] font-semibold text-slate-400 mt-1">记录</span>
              </button>

              <button onClick={() => setMobileTab('stats')}
                className={`flex flex-col items-center gap-1 px-6 py-1.5 rounded-xl transition ${mobileTab==='stats' ? 'text-blue-600 dark:text-blue-400' : 'text-slate-400 dark:text-slate-500'}`}>
                <BarChart2 size={20} />
                <span className="text-[10px] font-semibold">统计</span>
              </button>
            </div>
          </main>

          <RecordModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={handleSave} onDelete={handleDelete} selectedDate={selectedDate} existingRecord={editingRecord} settings={settings} />
          <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} settings={settings} onSave={handleSaveSettings} />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>


  <script>
    (async function initPWA() {
      if (!('serviceWorker' in navigator)) return;
      try {
        const reg = await navigator.serviceWorker.register('/sw.js', { scope: '/' });
        console.log('[PWA] SW registered:', reg.scope);
        reg.addEventListener('updatefound', () => {
          const w = reg.installing;
          w.addEventListener('statechange', () => {
            if (w.state === 'installed' && navigator.serviceWorker.controller) {
              const t = document.createElement('div');
              t.textContent = '发现新版本，点击刷新';
              t.style.cssText = 'position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:10px 18px;border-radius:12px;font-size:13px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.3);white-space:nowrap;cursor:pointer';
              t.onclick = () => location.reload();
              document.body.appendChild(t);
              setTimeout(() => t.remove(), 8000);
            }
          });
        });
      } catch(e) { console.warn('[PWA] SW error:', e.message); }
    })();

    let _dip = null;
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault(); _dip = e;
      const d = localStorage.getItem('pwa_dismissed');
      if (!d || Date.now() - Number(d) > 7*86400000) setTimeout(showPWABanner, 1500);
    });

    function showPWABanner() {
      if (document.getElementById('pwa-banner') || !_dip) return;
      const b = document.createElement('div');
      b.id = 'pwa-banner';
      b.innerHTML = '<div style="display:flex;align-items:center;gap:12px;flex:1"><div style="width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,#3b82f6,#6366f1);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 12px rgba(99,102,241,.4)"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 3H8l-2 4h12z"/></svg></div><div><div style="font-weight:700;font-size:14px;color:#1e293b">安装加班助手</div><div style="font-size:12px;color:#64748b;margin-top:2px">添加到桌面，随时快速记录工时</div></div></div><div style="display:flex;gap:8px;flex-shrink:0;margin-left:8px"><button id="pwa-ok" style="padding:8px 18px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:white;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(99,102,241,.3)">安装</button><button id="pwa-no" style="padding:8px 12px;background:#f1f5f9;color:#64748b;border:none;border-radius:10px;font-size:13px;cursor:pointer">&#x2715;</button></div>';
      b.style.cssText = 'position:fixed;bottom:76px;left:12px;right:12px;background:rgba(255,255,255,.97);backdrop-filter:blur(16px);border:1px solid rgba(99,102,241,.15);border-radius:18px;padding:14px 16px;display:flex;align-items:center;box-shadow:0 8px 32px rgba(59,130,246,.18);z-index:9998;font-family:"Plus Jakarta Sans",sans-serif';
      document.body.appendChild(b);
      document.getElementById('pwa-ok').onclick = async () => { b.remove(); _dip.prompt(); await _dip.userChoice; _dip = null; };
      document.getElementById('pwa-no').onclick = () => { b.remove(); localStorage.setItem('pwa_dismissed', Date.now()); _dip = null; };
    }
    window.addEventListener('appinstalled', () => { document.getElementById('pwa-banner')?.remove(); });
  </script>
</body>
</html>
